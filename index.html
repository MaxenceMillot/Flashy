<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashy</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div>Flashy</div>

    <div class="header-actions">

    </div>
</header>

<div class="container">
    <!-- STUDY -->
    <div id="study">

        <div class="card" id="card">
            <img id="img" alt="flashcard image">
            <div class="answer" id="answer"></div>
        </div>

        <div class="buttons">
            <button id="btnShow" class="btn-show" onclick="showAnswer()">
                Show answer
            </button>

            <div id="gradeButtons" style="display:none;">
                <button class="fail" onclick="grade(1)">Failed</button>
                <button class="partial" onclick="grade(3)">Partial</button>
                <button class="hard" onclick="grade(4)">Hard</button>
                <button class="easy" onclick="grade(5)">Easy</button>
            </div>
        </div>

    </div>

    <!-- DECKS -->
    <h2>Choix des jeux de carte</h2>
    <div class="decks" id="deckContainer"></div>

    <!-- RESET -->
    <button style="background:#545353; color:white;" onclick="resetProgress()">Reset</button>

</div>

<script src="cards.js"></script>
<script src="app.js"></script>

</body>
</html>
