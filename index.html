<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">

        
        <title>Flashy</title>
    </head>

    <body>
        <header>
            <div>Flashy</div>
        </header>

        <div class="container">
            <!-- STUDY -->
            <div id="study">

                <div class="card" id="card">
                    <img id="img" alt="flashcard image">
                    <div class="answer" id="answer"></div>
                </div>

                <div class="buttons">
                    <button id="btnShow" class="btn-show" onclick="showAnswer()">
                        Voir la réponse
                    </button>

                    <div id="gradeButtons" style="display:none;">
                        <button class="fail" onclick="grade(1)">Raté</button>
                        <button class="partial" onclick="grade(3)">Presque</button>
                        <button class="correct" onclick="grade(5)">Correct</button>
                    </div>
                </div>

            </div>

            <!-- DECKS -->
            <h2>Choix des jeux de carte</h2>
            <div class="decks" id="deckContainer"></div>

            <!-- RESET -->
            <button style="background:#545353; color:white;" onclick="resetProgress()">Reset</button>

        </div>

        <script src="cards.js"></script>
        <script src="app.js"></script>
    </body>
</html>
